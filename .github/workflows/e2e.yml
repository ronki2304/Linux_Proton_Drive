name: E2E Tests

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  e2e:
    name: E2E & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64 src/cli.ts --outfile dist/protondrive

      - name: Run e2e tests
        run: bun test src/__e2e__/

      - name: Run integration tests
        if: github.event_name == 'push'
        env:
          PROTON_TEST_USER: ${{ secrets.PROTON_TEST_USER }}
          PROTON_TEST_PASS: ${{ secrets.PROTON_TEST_PASS }}
        run: bun test src/__integration__/
