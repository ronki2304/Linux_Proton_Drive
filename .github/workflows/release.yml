name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Run tests (release gate)
        run: bun test

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Building version: $VERSION"

      - name: Build binary
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64 src/cli.ts --outfile dist/protondrive

      - name: Build AppImage
        run: |
          test -f dist/protondrive || { echo "ERROR: dist/protondrive not found — bun build step failed" >&2; exit 1; }
          bash packaging/appimage/build-appimage.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            dist/protondrive
            dist/protondrive.AppImage
          generate_release_notes: true
