app-id: io.github.ronki2304.ProtonDriveLinuxClient
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: protondrive

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=/run/systemd/resolve:ro
  - --talk-name=org.freedesktop.secrets

modules:
  # Python dependencies
  - name: python3-pyyaml
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app pyyaml
    sources: []

  # UI module — Python/GTK4/Libadwaita
  - name: protondrive-ui
    buildsystem: meson
    post-install:
      - glib-compile-schemas /app/share/glib-2.0/schemas
    sources:
      - type: dir
        path: ../ui

  # Engine module — TypeScript/Bun sync engine compiled to self-contained binary (Option A)
  # `bun build --compile` embeds the Bun runtime + bun:sqlite; no Bun needed at runtime.
  #
  # Bun itself is not part of the GNOME SDK, so we pull the official precompiled
  # release for the build host architecture and use it in-place — it's consumed
  # at build time only and is NOT installed into /app.
  - name: protondrive-engine
    buildsystem: simple
    # Bun-compiled binaries embed the source/runtime in a non-standard layout
    # that `strip` and the debuginfo-extract pipeline corrupt — a stripped
    # binary silently falls back to running as vanilla `bun` (prints help and
    # exits). Disable the strip + debuginfo steps via build-options for this
    # module; that keeps the compiled binary byte-exact after build.
    build-options:
      build-args:
        - --share=network
      strip: false
      no-debuginfo: true
      no-debuginfo-compression: true
    build-commands:
      # Bun archive extracts directly to ./bun (flatpak-builder applies
      # `strip-components: 1` to archives by default, which drops the
      # `bun-linux-{aarch64,x64}/` prefix). Ensure the bit is set explicitly
      # — zip preserves executable permissions but be belt-and-suspenders.
      - chmod +x ./bun
      - ./bun install --frozen-lockfile
      - ./bun build --compile src/main.ts --outfile=dist/engine
      - mkdir -p /app/lib/protondrive-engine/dist
      - install -Dm755 dist/engine /app/lib/protondrive-engine/dist/engine
    sources:
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.11/bun-linux-aarch64.zip
        sha256: d13944da12a53ecc74bf6a720bd1d04c4555c038dfe422365356a7be47691fdf
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.11/bun-linux-x64.zip
        sha256: 8611ba935af886f05a6f38740a15160326c15e5d5d07adef966130b4493607ed
      - type: dir
        path: ../engine
